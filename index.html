<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>My PFM Web App</title>
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="C:\resource\bootstrap-5.3.0-alpha1-dist\bootstrap-5.3.0-alpha1-dist\css\bootstrap.min.css">
<script src="path/to/bootstrap.min.js"></script>


</head>

<body>
    <h1>
        My PFM Web App
    </h1>

  <div class="background-box">
      <div class="income"><p>INCOME</p></div>
      <img class="switch-icon" src="/assets/icon/swith-icon.svg">
      <!--The conent can't input-->
      <div class="name-group">
        <p class="amount">Amount</p>
        <p class="catetory">Category</p>
        <p class="date">Date</p>
        <p class="account">Account</p>
        <p class="note">Note</p>
      </div>

          <!--The conent can input-->
      <div class="input-group">
        <!--Form to send data-->
        <form action="insert_record.php" method="post" id="submit">
        <!--This is the input money field-->
            <input id="money" type="number" class="amount-money" placeholder="Input your money" min="1" max="999999999"></input>

        <!--This is the category pulldown-->
            <select class="category-select" name="category" id="category">
                <option value="" disabled selected>Select your category</option>
                <option value="Food 🍗">Food 🍗</option>
                <option value="Transport 🚌">Transport 🚌</option>
                <option value="Education 📚">Education 📚</option>
                <option value="Property 🏠">Property 🏠</option>
            </select>
        <!--This is the calendar select date-->
        <input type="date" id="date" placeholder="Select a date"></input>

        <!--This is the account pulldown-->
            <select class="account-select" name="account" id="account">
                <option value="" disabled selected>Select your account</option>
                <option value="CIBC">CIBC</option>
                <option value="TD Bank">TD Bank</option>
                <option value="Wallet">Wallet</option>
                <option value="Cash">Cash</option>
              </select>

        <!--This is the note field-->
        <textarea id="note" type="text" class="note" placeholder="Input your note"></textarea>
        </form>
      </div>
        <!--Submit button-->
      <button class="submit-button" type="submit" id="submit-button">Submit</button>
      
    </div>

    <div class="container-xl">
        <table class="table" id="table">
                <tr>
                    <th scope="col">Account</th>
                    <th scope="col">Amount</th>
                    <th scope="col">Date</th>
                    <th scope="col">Category</th>
                    <th scope="col">Note</th>
                </tr>
                <tbody>
                    <tr>
                      <td scope="row">CIBC</td>
                      <td scope="row">$4000</td>
                      <td scope="row">2023/04/10</td>
                      <td scope="row">Salary</td>
                      <td scope="row">March's Salary</td>
                    </tr>
                    <tr>
                      <td scope="row">CIBC</td>
                      <td scope="row">$400</td>
                      <td scope="row">2023/04/15</td>
                      <td scope="row">Food</td>
                      <td scope="row">Hang out with family</td>
                    </tr>
                  </tbody>
        </table>
    </div>



      
















<script src="app.js"></script>
</body>
</html>
