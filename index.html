<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>My PFM Web App</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="C:\resource\bootstrap-5.3.0-alpha1-dist\bootstrap-5.3.0-alpha1-dist\css\bootstrap.min.css">
  <script src="path/to/bootstrap.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />

</head>

<body>
  <div class="header">
    <h1>
        My PFM Web App
    </h1>
  </div>
  
  <div class="app-body">
<!--Input Area-->
  <div class="background-box">
    <!--Income/expnese selec-->
    <div class="container1">
      <div class="income"><p>INCOME</p></div>
      <img class="switch-icon" src="/assets/icon/swith-icon.svg">
    </div>

    <!--Amount input field-->
  <div class="container2">
    <p class="amount">Amount</p>
    <input id="money" type="number" class="amount-money" placeholder="Input your money" min="1" max="999999999"></input>
  </div>

      <!--Category selector-->
  <div class="container3">
    <p class="catetory">Category</p>
    <select class="category-select" name="category" id="category">
      <option value="" disabled selected>Select your category</option>
      <option value="Food 🍗">Food 🍗</option>
      <option value="Transport 🚌">Transport 🚌</option>
      <option value="Education 📚">Education 📚</option>
      <option value="Property 🏠">Property 🏠</option>
  </select>
  </div>

      <!--Date selector-->
  <div class="container4">
    <p class="date">Date</p>
    <input type="date" id="date" placeholder="Select a date"></input>
  </div>

      <!--Account selector-->
  <div class="container5">
    <p class="account">Account</p>
    <select class="account-select" name="account" id="account">
      <option value="" disabled selected>Select your account</option>
      <option value="CIBC">CIBC</option>
      <option value="TD Bank">TD Bank</option>
      <option value="Wallet">Wallet</option>
      <option value="Cash">Cash</option>
    </select>
  </div>

      <!--Note-->
  <div class="container6">
    <p class="note">Note</p>
    <textarea id="note" type="text" class="note" placeholder="Input your note"></textarea>
  </div>

  <!--Submit button-->
  <div class="container7">
    <button class="submit-button" type="submit" id="submit-button">Submit</button>
  </div>

  <!-- Error Message -->
  <div id="error-message"></div>

  </div>

<!--Transaction Table Record-->
    <div class="transaction-table">
        <table class="table" id="table">
          <thead>
            <tr>
              <td>Account</td>
              <td>Amount</td>
              <td>Date</td>
              <td>Category</td>
              <td>Note</td>
              <td>Action</td>
            </tr>
          </thead>
          <tbody>
          </tbody>
        </table>
    </div>
  </div>


<script src="app.js"></script>
</body>
</html>
